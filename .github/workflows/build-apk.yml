name: 🚀 Build & Deploy BlogVerse APK

on:
  push:
    branches:
      - main
      - release
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production
          - production-apk

jobs:
  build-android:
    name: 🤖 Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🔧 Setup Expo & EAS CLI
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 🗑️ Remove ads package
        run: npx json -I -f package.json -e 'delete this.dependencies["react-native-unity-ads"]'

      - name: 📋 Install project dependencies
        run: npm install

      - name: 🔑 Create google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > google-services.json

      - name: 🔐 Create .env file
        run: |
          cat > .env << EOF
          FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID }}
          EOF

      - name: 🏗️ Build Preview APK
        if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
        run: eas build --platform android --profile preview --non-interactive --no-wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: 🚀 Build Production APK
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.build_type == 'production-apk'
        run: eas build --platform android --profile production-apk --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
